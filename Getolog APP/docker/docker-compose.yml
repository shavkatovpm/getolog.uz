services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: getolog
      POSTGRES_PASSWORD: getolog
      POSTGRES_DB: getolog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  pgdata:
