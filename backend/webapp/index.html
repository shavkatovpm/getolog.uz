<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Getolog Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/webapp/style.css">
</head>
<body>

    <!-- ── Views ── -->
    <main>
        <!-- Dashboard -->
        <section id="view-dashboard" class="view active">
            <div class="section-header">
                <h2 class="section-title">Statistika</h2>
            </div>
            <div id="dashboard-content"></div>
        </section>

        <!-- Payments -->
        <section id="view-payments" class="view">
            <div class="section-header">
                <h2 class="section-title">To'lovlar</h2>
            </div>
            <div id="payments-content"></div>
        </section>

        <!-- Users -->
        <section id="view-users" class="view">
            <div class="section-header">
                <h2 class="section-title">Foydalanuvchilar</h2>
                <button class="btn btn-primary btn-sm" onclick="openBroadcastModal()">📢 Hammaga</button>
            </div>
            <div id="users-content"></div>
        </section>

        <!-- Settings -->
        <section id="view-settings" class="view">
            <div class="section-header">
                <h2 class="section-title">Sozlamalar</h2>
            </div>
            <div id="settings-content"></div>
        </section>
    </main>

    <!-- ── Message Modal ── -->
    <div id="message-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">Xabar yuborish</div>
            <div class="modal-subtitle" id="modal-username"></div>
            <textarea class="form-textarea" id="modal-text" rows="4" placeholder="Xabar matni..."></textarea>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-ghost">Bekor</button>
                <button id="modal-send" class="btn btn-primary">Yuborish</button>
            </div>
        </div>
    </div>

    <!-- ── Screenshot Modal ── -->
    <div id="screenshot-modal" class="modal hidden">
        <div class="modal-content">
            <img id="screenshot-img" class="screenshot-img" src="" alt="Screenshot">
            <button id="screenshot-close" class="btn btn-ghost btn-full">Yopish</button>
        </div>
    </div>

    <!-- ── Tab Bar ── -->
    <nav class="tab-bar">
        <button class="tab active" data-tab="dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            <span>Statistika</span>
        </button>
        <button class="tab" data-tab="payments">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
            <span>To'lovlar</span>
        </button>
        <button class="tab" data-tab="users">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Userlar</span>
        </button>
        <button class="tab" data-tab="settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            <span>Sozlamalar</span>
        </button>
    </nav>

    <script src="/webapp/app.js"></script>
</body>
</html>
